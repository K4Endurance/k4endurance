<!-- 
  K4 Endurance – Plyometrics Rechner
  Einbinden: Diesen kompletten Block in eine Jekyll-Seite/Page einfügen 
  (z.B. als Include oder direkt in den Markdown/HTML-Content).
  Nutzt nur Inline-Styles + Scoped CSS, keine externen Abhängigkeiten.
-->
<div id="plyo-calculator" class="plyo-calc">
  <style>
    #plyo-calculator {
      --k4-orange: #e8380d;
      --k4-border: #e0e0e0;
      --k4-bg-light: #faf9f7;
      font-family: 'DM Sans', sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 1.5rem;
      border: 1px solid var(--k4-border);
      border-radius: 8px;
      background: var(--k4-bg-light);
    }
    #plyo-calculator h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: 1.5rem;
      margin: 0 0 1rem 0;
      color: #222;
    }
    #plyo-calculator .plyo-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }
    #plyo-calculator select.plyo-exercise {
      flex: 1 1 260px;
      min-width: 180px;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--k4-border);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
    }
    #plyo-calculator input.plyo-count {
      width: 90px;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--k4-border);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }
    #plyo-calculator .plyo-row-value {
      width: 90px;
      font-size: 0.9rem;
      color: #555;
      text-align: right;
    }
    #plyo-calculator .plyo-remove {
      background: none;
      border: none;
      color: #999;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 0.3rem;
      transition: color 0.15s ease;
    }
    #plyo-calculator .plyo-remove:hover {
      color: var(--k4-orange);
    }
    #plyo-calculator .plyo-add-btn {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.5rem 1rem;
      background: #fff;
      border: 1px solid var(--k4-orange);
      color: var(--k4-orange);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    #plyo-calculator .plyo-add-btn:hover {
      background: var(--k4-orange);
      color: #fff;
    }
    #plyo-calculator .plyo-summary {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 2px solid var(--k4-orange);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    #plyo-calculator .plyo-summary-label {
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      color: #222;
    }
    #plyo-calculator .plyo-summary-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.1rem;
      font-weight: 600;
      color: var(--k4-orange);
    }
    #plyo-calculator .plyo-summary-unit {
      font-size: 1rem;
      color: #777;
      margin-left: 0.3rem;
    }
    #plyo-calculator .plyo-hint {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.3rem;
    }
  </style>

  <h3>Plyometrics Session Rechner</h3>
  <div id="plyo-rows"></div>
  <button type="button" class="plyo-add-btn" id="plyo-add-btn">+ Übung hinzufügen</button>

  <div class="plyo-summary">
    <span class="plyo-summary-label">Gesamtbelastung der Session</span>
    <span><span class="plyo-summary-value" id="plyo-total">0</span><span class="plyo-summary-unit">gewichtete Einheiten</span></span>
  </div>
  <p class="plyo-hint">Berechnung: Σ (Anzahl Sprünge × Gewichtungsfaktor) je Übung</p>

  <script>
  (function() {
    var EXERCISES = [
      { name: "Depth Jump 15", factor: 1 },
      { name: "Drop Jump 15", factor: 1.12 },
      { name: "Depth Jump 30", factor: 1.19 },
      { name: "Pogo Backwards", factor: 1.28 },
      { name: "Drop Jump 30", factor: 1.31 },
      { name: "Depth Jump 45", factor: 1.41 },
      { name: "Drop Jump 45", factor: 1.54 },
      { name: "Slalom Hops", factor: 1.58 },
      { name: "Tuck Jumps", factor: 1.66 },
      { name: "Depth Jump 60", factor: 1.67 },
      { name: "6\"-12\" Hurdle Rebound Jumps", factor: 1.69 },
      { name: "Pogo Forwards", factor: 1.75 },
      { name: "Drop Jump 60", factor: 1.80 },
      { name: "Lateral Hops", factor: 1.88 },
      { name: "Hurdle Rebound Jumps - medium hurdles", factor: 1.90 },
      { name: "Depth Jump 75", factor: 1.99 },
      { name: "Hurdle Rebound Jumps - High Hurdles", factor: 2.02 },
      { name: "Medial Hops", factor: 2.03 },
      { name: "Zig-Zag Hops", factor: 2.07 },
      { name: "Drop Jump 75", factor: 2.11 },
      { name: "Ankling", factor: 2.25 },
      { name: "Depth Jump 90", factor: 2.37 },
      { name: "Drop Jump 90", factor: 2.48 },
      { name: "Hops R,R,L,L", factor: 2.63 },
      { name: "Bounding", factor: 2.67 },
      { name: "Depth Jump 105", factor: 2.81 },
      { name: "Drop Jump 105", factor: 2.90 },
      { name: "Hops R,R,R...; L,L,L", factor: 3.09 },
      { name: "Depth Jump 120", factor: 3.34 },
      { name: "Drop Jump 120", factor: 3.41 }
    ];

    var rowsContainer = document.getElementById('plyo-rows');
    var addBtn = document.getElementById('plyo-add-btn');
    var totalEl = document.getElementById('plyo-total');
    var rowIdCounter = 0;

    function buildOptions(select) {
      EXERCISES.forEach(function(ex, idx) {
        var opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = ex.name + ' (×' + ex.factor.toFixed(2) + ')';
        select.appendChild(opt);
      });
    }

    function addRow() {
      rowIdCounter++;
      var row = document.createElement('div');
      row.className = 'plyo-row';
      row.dataset.rowId = rowIdCounter;

      var select = document.createElement('select');
      select.className = 'plyo-exercise';
      buildOptions(select);
      select.addEventListener('change', recalc);

      var count = document.createElement('input');
      count.type = 'number';
      count.className = 'plyo-count';
      count.min = '0';
      count.value = '10';
      count.placeholder = 'Anzahl';
      count.addEventListener('input', recalc);

      var value = document.createElement('span');
      value.className = 'plyo-row-value';
      value.textContent = '= 0';

      var removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'plyo-remove';
      removeBtn.innerHTML = '&times;';
      removeBtn.title = 'Übung entfernen';
      removeBtn.addEventListener('click', function() {
        row.remove();
        recalc();
      });

      row.appendChild(select);
      row.appendChild(count);
      row.appendChild(value);
      row.appendChild(removeBtn);
      rowsContainer.appendChild(row);
      recalc();
    }

    function recalc() {
      var total = 0;
      var rows = rowsContainer.querySelectorAll('.plyo-row');
      rows.forEach(function(row) {
        var select = row.querySelector('.plyo-exercise');
        var count = row.querySelector('.plyo-count');
        var valueEl = row.querySelector('.plyo-row-value');
        var factor = EXERCISES[parseInt(select.value, 10)].factor;
        var n = parseFloat(count.value) || 0;
        var rowVal = n * factor;
        valueEl.textContent = '= ' + rowVal.toFixed(1);
        total += rowVal;
      });
      totalEl.textContent = total.toFixed(1);
    }

    addBtn.addEventListener('click', addRow);

    // Start mit einer Zeile
    addRow();
  })();
  </script>
</div>
