media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: "Blog-Artikel"
    type: collection
    path: '_posts'
    view:
      fields: [title, date, category]
    fields:
      - { name: date, label: "Datum", type: date }
      - { name: title, label: "Titel", type: string }
      - name: category
        label: "Kategorie"
        type: select
        options:
          values: ["Training", "Ernährung", "Mentale Stärke", "Material", "Sonstiges"]
      - { name: author, label: "Autor", type: string }
      - { name: image, label: "Titelbild", type: image }
      - { name: excerpt, label: "Kurzbeschreibung (für Übersicht)", type: text }
      - { name: body, label: "Artikeltext", type: rich-text }

  - name: rechner
    label: "Rechner"
    type: file
    path: _data/rechner.yml
    fields:
      - name: intro
        label: "Einleitung"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: title, label: "Titel", type: string }
          - { name: text, label: "Beschreibungstext", type: text }
      - name: items
        label: "Rechner-Liste"
        type: object
        list: true
        fields:
          - { name: title, label: "Name des Rechners", type: string }
          - { name: description, label: "Beschreibung", type: text }
          - { name: url, label: "Link (z.B. /tools/mein-rechner/)", type: string }
          - { name: icon, label: "Emoji-Icon", type: string }
          - name: status
            label: "Status"
            type: select
            options:
              values: ["live", "bald verfügbar"]

  - name: home
    label: "Startseite"
    type: file
    path: _data/home.yml
    fields:
      - name: hero
        label: "Hero-Bereich"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile (z.B. K4 Endurance)", type: string }
          - { name: title_line1, label: "Titelzeile 1", type: string }
          - { name: title_line2, label: "Titelzeile 2 (orange)", type: string }
          - { name: title_line3, label: "Titelzeile 3", type: string }
          - { name: subtitle, label: "Untertitel", type: text }
          - { name: photo, label: "Hero-Foto", type: image }

      - name: offer
        label: "Was wir bieten"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: title, label: "Titel", type: string }
          - name: items
            label: "Stichpunkte"
            type: string
            list: true

      - name: coach
        label: "Dein Coach"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: name, label: "Name", type: string }
          - { name: photo, label: "Foto", type: image }
          - { name: bio_paragraph1, label: "Bio – Absatz 1", type: text }
          - { name: bio_paragraph2, label: "Bio – Absatz 2", type: text }
          - name: tags
            label: "Schlagworte"
            type: string
            list: true

      - name: highlights
        label: "Highlights / Meilensteine"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: title, label: "Titel", type: string }
          - name: items
            label: "Meilensteine"
            type: object
            list: true
            fields:
              - { name: title, label: "Titel", type: string }
              - { name: category, label: "Kategorie / Jahr", type: string }
              - { name: description, label: "Beschreibung", type: text }
              - { name: photo, label: "Foto", type: image }

      - name: tutorials
        label: "Tutorials / Plattform"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: title, label: "Titel", type: string }
          - { name: intro, label: "Einleitungstext", type: text }
          - name: items
            label: "Tutorial-Themen"
            type: object
            list: true
            fields:
              - { name: title, label: "Titel", type: string }
              - { name: description, label: "Beschreibung", type: text }

      - name: pricing
        label: "Coaching-Pläne"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: title, label: "Titel", type: string }
          - name: basic
            label: "Plan: Basic"
            type: object
            fields:
              - { name: name, label: "Name", type: string }
              - { name: price, label: "Preis (Zahl, ohne €)", type: string }
              - name: items
                label: "Leistungen"
                type: string
                list: true
          - name: premium
            label: "Plan: Premium"
            type: object
            fields:
              - { name: name, label: "Name", type: string }
              - { name: badge, label: "Badge-Text", type: string }
              - { name: price, label: "Preis (Zahl, ohne €)", type: string }
              - name: items
                label: "Leistungen"
                type: string
                list: true

      - name: contact
        label: "Kontakt"
        type: object
        fields:
          - { name: kicker, label: "Vorzeile", type: string }
          - { name: title, label: "Titel", type: string }
          - { name: text, label: "Beschreibungstext", type: text }
          - { name: email, label: "E-Mail-Adresse", type: string }
          - { name: location, label: "Standort", type: string }

      - name: footer
        label: "Footer"
        type: object
        fields:
          - { name: copyright, label: "Copyright-Zeile", type: string }
          - { name: privacy_url, label: "Link zur Datenschutzseite", type: string }